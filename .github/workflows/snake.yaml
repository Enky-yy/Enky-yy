name: Generate Snake

on:
  schedule:
    - cron: "30 18 * * *"
    - cron: "30 6 * * *"
  workflow_dispatch:      
    branches:
        - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Determine Theme based on Time (IST)
        id: theme
        run: |
          HOUR=$(date -u -d '+5 hours 30 minutes' +%H)
          echo "Current hour in IST: $HOUR"
         
          echo "its time in india. using Dark only"
          echo "palette=github-dark" >> $GITHUB_OUTPUT 
          fi

      - name: Generate Snake Game
        uses: Platane/snk@v3
        with:
          github_user_name: Enky-yy
          outputs: |
            dist/github-snake.svg?palette=github-dark
            dist/ocean.gif?color_snake=orange&color_dots=#ff6a00,#ffd60a,#ffaa00,#ff8800,#ffffff


      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
